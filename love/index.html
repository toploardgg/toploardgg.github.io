<!DOCTYPE html>
<html lang="ru">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>For You ♥</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&display=swap"
            rel="stylesheet">
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --rose: #e8436a;
                --rose-light: #ff7096;
                --rose-glow: #ff2d5580;
                --cream: #fff0f3;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: #000;
                overflow: hidden;
                font-family: 'Cormorant Garamond', serif;
                cursor: default;
            }

            canvas#stars {
                position: fixed;
                inset: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
                pointer-events: none;
            }

            #hearts-bg {
                position: fixed;
                inset: 0;
                z-index: 1;
                pointer-events: none;
                overflow: hidden;
            }

            .floating-heart {
                position: absolute;
                bottom: -60px;
                animation: floatUp linear infinite;
                opacity: 0;
                pointer-events: none;
                font-size: 20px;
                filter: drop-shadow(0 0 6px var(--rose-glow));
            }

            @keyframes floatUp {
                0% {
                    transform: translateY(0) rotate(0deg) scale(0.6);
                    opacity: 0;
                }

                10% {
                    opacity: 0.8;
                }

                90% {
                    opacity: 0.4;
                }

                100% {
                    transform: translateY(-110vh) rotate(360deg) scale(1.2);
                    opacity: 0;
                }
            }

            #scene {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 10;
                text-align: center;
                padding: 2rem;
            }

            #heart-canvas {
                display: block;
                margin-bottom: 1.6rem;
            }

            .name {
                font-family: 'Playfair Display', serif;
                font-size: clamp(52px, 12vw, 100px);
                font-weight: 700;
                color: #fff;
                letter-spacing: -0.02em;
                line-height: 1;
                text-shadow:
                    0 0 40px rgba(232, 67, 106, 0.6),
                    0 0 80px rgba(232, 67, 106, 0.3);
                opacity: 0;
                animation: fadeInUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.7s;
                margin-bottom: 1.4rem;
                position: relative;
            }

            .name::after {
                content: attr(data-name);
                position: absolute;
                inset: 0;
                color: transparent;
                -webkit-text-stroke: 1px rgba(255, 255, 255, 0.08);
                transform: translate(3px, 4px);
                z-index: -1;
            }

            .divider {
                display: flex;
                align-items: center;
                gap: 14px;
                margin-bottom: 1.4rem;
                opacity: 0;
                animation: fadeInUp 1s ease forwards 1.1s;
            }

            .divider-line {
                width: 60px;
                height: 1px;
                background: linear-gradient(90deg, transparent, var(--rose), transparent);
            }

            .divider-heart {
                font-size: 12px;
                color: var(--rose);
            }

            .love-text {
                font-family: 'Cormorant Garamond', serif;
                font-style: italic;
                font-size: clamp(36px, 8vw, 64px);
                font-weight: 300;
                color: var(--cream);
                letter-spacing: 0.04em;
                text-shadow: 0 0 30px rgba(232, 67, 106, 0.4);
                opacity: 0;
                animation: fadeInUp 1.4s ease forwards 1.4s;
                margin-bottom: 1rem;
            }

            .hearts-row {
                display: flex;
                gap: 10px;
                justify-content: center;
                opacity: 0;
                animation: fadeInUp 1s ease forwards 2s;
            }

            .hearts-row span {
                font-size: 18px;
                animation: heartBeat 1.4s ease-in-out infinite;
                color: var(--rose);
                filter: drop-shadow(0 0 8px var(--rose));
            }

            .hearts-row span:nth-child(2) {
                animation-delay: 0.2s;
                font-size: 22px;
            }

            .hearts-row span:nth-child(3) {
                animation-delay: 0.4s;
                font-size: 16px;
            }

            @keyframes heartBeat {

                0%,
                100% {
                    transform: scale(1);
                }

                14% {
                    transform: scale(1.15);
                }

                28% {
                    transform: scale(1);
                }

                42% {
                    transform: scale(1.1);
                }

                70% {
                    transform: scale(1);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(28px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .click-heart {
                position: fixed;
                pointer-events: none;
                z-index: 9998;
                font-size: 28px;
                animation: clickHeartAnim 0.9s ease forwards;
            }

            @keyframes clickHeartAnim {
                0% {
                    transform: translate(-50%, -50%) scale(0.3);
                    opacity: 1;
                }

                60% {
                    transform: translate(-50%, -120%) scale(1.3);
                    opacity: 1;
                }

                100% {
                    transform: translate(-50%, -200%) scale(0.8);
                    opacity: 0;
                }
            }

            .glitch {
                animation: glitch 0.3s linear;
            }

            @keyframes glitch {

                0%,
                100% {
                    text-shadow: 0 0 40px rgba(232, 67, 106, 0.6), 0 0 80px rgba(232, 67, 106, 0.3);
                }

                25% {
                    text-shadow: -3px 0 #ff2d55, 3px 0 #0ff, 0 0 40px rgba(232, 67, 106, 0.6);
                }

                75% {
                    text-shadow: 3px 0 #ff2d55, -3px 0 #0ff, 0 0 40px rgba(232, 67, 106, 0.6);
                }
            }
        </style>
    </head>

    <body>

        <canvas id="stars"></canvas>
        <div id="hearts-bg"></div>

        <div id="scene">
            <canvas id="heart-canvas"></canvas>

            <div class="name" data-name="name" id="main-name">Name</div>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-heart">♥</span>
                <div class="divider-line"></div>
            </div>

            <div class="love-text">I love you</div>

            <div class="hearts-row">
                <span>♥</span>
                <span>♥</span>
                <span>♥</span>
            </div>
        </div>

        <script>
            // ── Stars ─────────────────────────────────────────────────────────────
            const starsCanvas = document.getElementById('stars');
            const sCtx = starsCanvas.getContext('2d');
            let SW, SH, stars = [];

            function initStars() {
                SW = starsCanvas.width = window.innerWidth;
                SH = starsCanvas.height = window.innerHeight;
                stars = Array.from({ length: 200 }, () => ({
                    x: Math.random() * SW, y: Math.random() * SH,
                    r: Math.random() * 1.4 + 0.2,
                    a: Math.random(),
                    da: (Math.random() - 0.5) * 0.008
                }));
            }
            function drawStars() {
                sCtx.clearRect(0, 0, SW, SH);
                for (const s of stars) {
                    s.a += s.da;
                    if (s.a < 0.05 || s.a > 1) s.da *= -1;
                    sCtx.beginPath();
                    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    sCtx.fillStyle = `rgba(255,255,255,${s.a.toFixed(2)})`;
                    sCtx.fill();
                }
                requestAnimationFrame(drawStars);
            }
            window.addEventListener('resize', () => { initStars(); buildHeartDots(); });
            initStars();
            drawStars();

            // ── Floating hearts background ──────────────────────────────────────
            const heartsBg = document.getElementById('hearts-bg');
            const heartChars = ['♥', '♡', '❤', '💗', '💕'];
            function spawnHeart() {
                const el = document.createElement('div');
                el.className = 'floating-heart';
                el.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
                const size = 12 + Math.random() * 22;
                el.style.cssText = `
    left:${Math.random() * 100}%;
    font-size:${size}px;
    color:hsl(${340 + Math.random() * 30}deg,80%,${55 + Math.random() * 20}%);
    animation-duration:${5 + Math.random() * 8}s;
    animation-delay:${Math.random() * 2}s;
  `;
                heartsBg.appendChild(el);
                setTimeout(() => el.remove(), 15000);
            }
            setInterval(spawnHeart, 600);
            for (let i = 0; i < 10; i++) setTimeout(spawnHeart, i * 200);

            // ── Heart of "I love you" texts ────────────────────────────────────
            const hc = document.getElementById('heart-canvas');
            const hCtx = hc.getContext('2d');

            // Parametric heart: standard math-heart formula
            function heartPoint(t, scale, cx, cy) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                return [cx + x * scale, cy + y * scale];
            }

            const LABEL = 'I love you';
            const N_DOTS = 58;
            let dots = [];

            function buildHeartDots() {
                const size = Math.min(window.innerWidth * 0.44, 230);
                hc.width = size * 2;
                hc.height = size * 2;
                hc.style.width = (size * 2) + 'px';
                hc.style.height = (size * 2) + 'px';

                const cx = hc.width / 2;
                const cy = hc.height / 2 + size * 0.06;
                const sc = size / 17;

                dots = [];
                for (let i = 0; i < N_DOTS; i++) {
                    const t = (i / N_DOTS) * Math.PI * 2;
                    const [x, y] = heartPoint(t, sc, cx, cy);
                    // each dot gets its own phase offset so wave travels around the heart
                    const phase = (i / N_DOTS) * Math.PI * 2;
                    dots.push({ x, y, phase });
                }
            }

            buildHeartDots();

            let time = 0;

            function drawHeart() {
                hCtx.clearRect(0, 0, hc.width, hc.height);
                time += 0.016;

                const fontSize = Math.max(9, Math.min(13, hc.width / 30));
                hCtx.textAlign = 'center';
                hCtx.textBaseline = 'middle';

                for (const d of dots) {
                    // travelling wave: sin(time - phase) maps −1..1
                    // shift so only positive part is visible → alpha 0..1
                    const wave1 = Math.max(0, Math.sin(time * 0.4 - d.phase));

                    const offset = Math.PI * 0.9;

                    const wave2 = Math.max(
                        0,
                        Math.sin(time * 0.4 - d.phase - offset)
                    );

                    const alpha = Math.max(wave1, wave2);

                    if (alpha < 0.01) continue;

                    const lightness = 55 + alpha * 28;
                    const sc2 = 0.82 + alpha * 0.32;

                    hCtx.save();
                    hCtx.globalAlpha = alpha;
                    hCtx.translate(d.x, d.y);
                    hCtx.scale(sc2, sc2);

                    if (alpha > 0.45) {
                        hCtx.shadowColor = '#ff2d55';
                        hCtx.shadowBlur = 8 * alpha;
                    } else {
                        hCtx.shadowBlur = 0;
                    }

                    hCtx.fillStyle = `hsl(345, 88%, ${lightness}%)`;
                    hCtx.font = `300 ${fontSize}px 'Cormorant Garamond', serif`;
                    hCtx.fillText(LABEL, 0, 0);
                    hCtx.restore();
                }

                hCtx.globalAlpha = 1;
                hCtx.shadowBlur = 0;
                requestAnimationFrame(drawHeart);
            }
            drawHeart();

            // ── Click effect ───────────────────────────────────────────────────
            document.addEventListener('click', e => {
                const el = document.createElement('div');
                el.className = 'click-heart';
                el.textContent = '♥';
                el.style.left = e.clientX + 'px';
                el.style.top = e.clientY + 'px';
                el.style.color = `hsl(${330 + Math.random() * 40}deg, 90%, 65%)`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 900);
            });
        </script>
    </body>

</html>
