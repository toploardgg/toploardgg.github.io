{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <meta name="robots" content="noindex" />
        <title>404 — Toploardgg</title>
        <link rel="icon" href="{% static 'img/icon.png' %}" type="image/png" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="{% static 'css/style.css' %}" />
        <link rel="stylesheet" href="{% static 'css/style-light.css' %}" />
    </head>
    <body>
        <!-- Navigation -->
        <div class="tabs">
            <div class="tabs-inner">
                <div class="func-wrapper left">
                    <button
                        type="button"
                        class="func-button search-btn"
                        aria-label="Open search"
                    >
                        <i class="fa-solid fa-search" aria-hidden="true"></i>
                    </button>
                    <div class="popover search-popover">
                        <h3>Search</h3>
                        <input type="text" id="search-input" />
                    </div>
                </div>

                <a href="/" class="become">Home</a>

                <div class="func-wrapper right">
                    <button
                        class="func-button theme-btn"
                        aria-label="Toggle theme"
                    >
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="page-404">
            <div class="err-orbit">
                <div class="err-orbit-ring"></div>
                <div class="err-orbit-ring"></div>
                <div class="err-orbit-ring"></div>
                <div class="err-dot"></div>
                <div class="err-dot"></div>
                <div class="err-center-icon">
                    <i class="fa-solid fa-satellite-dish"></i>
                </div>
            </div>

            <div class="err-code">
                <span class="err-glitch">404</span>
            </div>

            <div class="err-title">Page not found</div>

            <p class="err-desc">
                This page doesn't exist or was moved.<br />
                Let's get you back on track.
            </p>

            <div class="err-actions">
                <a class="err-btn primary" href="/">
                    <i class="fa-solid fa-house"></i> Go Home
                </a>
                <a
                    class="err-btn"
                    href="https://github.com/toploardgg"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <i class="fa-brands fa-github"></i> GitHub
                </a>
            </div>
        </div>

        <script>
            const themeBtn = document.querySelector(".theme-btn");
            if (themeBtn) {
                const updateIcon = (isLight) => {
                    themeBtn.innerHTML = isLight
                        ? '<i class="fa-solid fa-sun"></i>'
                        : '<i class="fa-solid fa-moon"></i>';
                };
                const saved = localStorage.getItem("theme");
                if (saved === "light") {
                    document.body.classList.add("light");
                    updateIcon(true);
                } else {
                    updateIcon(false);
                }
                themeBtn.addEventListener("click", () => {
                    document.body.classList.toggle("light");
                    const isLight = document.body.classList.contains("light");
                    updateIcon(isLight);
                    localStorage.setItem("theme", isLight ? "light" : "dark");
                });
            }
        </script>
    </body>
</html>
